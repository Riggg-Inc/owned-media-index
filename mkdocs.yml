site_name: Owned Media Index
site_description: Open patterns, tools, standards, and benchmarks for producing, publishing, measuring, and preserving owned media.
site_url: https://riggg-inc.github.io/owned-media-index/
repo_url: https://github.com/Riggg-Inc/owned-media-index
repo_name: Riggg-Inc/owned-media-index
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/riggg-logo-white.png
  favicon: assets/riggg-logo-white.png
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Montserrat
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.action.view
    - header.autohide

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Riggg-Inc/owned-media-index
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/company/riggg
  generator: false

copyright: >
  &copy; 2026 Riggg Inc. &nbsp;·&nbsp;
  <a href="https://creativecommons.org/licenses/by-sa/4.0/">CC BY-SA 4.0</a>

